name: Readiness Artifact Consistency Validation
on: [pull_request, workflow_dispatch]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python3 security-readiness/scripts/run_p0_runtime_boundary_proof.py
      - run: python3 security-readiness/scripts/validate_readiness_evidence.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: readiness-artifact-consistency-pack
          path: |
            security-readiness/evidence-artifacts/canonical-validation-result.json
            security-readiness/evidence-artifacts/p0-runtime-boundary-proof/final-status.json
            security-readiness/evidence-artifacts/p0-runtime-boundary-proof/*/evidence-result.json
            security-readiness/evidence-artifacts/p0-runtime-boundary-proof/*/pytest-output.txt
            security-readiness/evidence-artifacts/p0-runtime-boundary-proof/*/runtime-log.txt
