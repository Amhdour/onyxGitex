name: Readiness Artifact Validation
on: [pull_request, workflow_dispatch]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python3 security-readiness/scripts/validate_readiness_evidence.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: canonical-validation-result
          path: security-readiness/evidence-artifacts/canonical-validation-result.json
