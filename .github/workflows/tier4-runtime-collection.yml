name: Tier 4 Runtime Collection

on:
  workflow_dispatch:

jobs:
  tier4-runtime-collection:
    runs-on: ubuntu-latest
    env:
      TIER4_STATUS: COLLECTED_SKIPPED
      LAUNCH_POSTURE: NOT_ENOUGH_EVIDENCE
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize Tier 4 evidence placeholders
        run: |
          mkdir -p security-readiness/evidence-artifacts/tier4-ci-collection
          echo "UNAVAILABLE: install step did not complete or log was not captured." > security-readiness/evidence-artifacts/tier4-ci-collection/dependency-install.log
          echo "UNAVAILABLE: dependency import step did not complete or log was not captured." > security-readiness/evidence-artifacts/tier4-ci-collection/dependency-import-check.log
          echo "UNAVAILABLE: pytest collection step did not complete or log was not captured." > security-readiness/evidence-artifacts/tier4-ci-collection/pytest-collect.log
          echo "NOT_RUN: Tier 4 runtime execution is outside this collection-only workflow. No runtime PASS is asserted." > security-readiness/evidence-artifacts/tier4-ci-collection/runtime-test.log

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install backend and dev dependencies (Python 3.11)
        run: |
          set -o pipefail
          uv sync --python 3.11 --no-default-groups --group backend --group dev 2>&1             | tee security-readiness/evidence-artifacts/tier4-ci-collection/dependency-install.log

      - name: Verify fastapi-users imports
        run: |
          set -o pipefail
          uv run --python 3.11 python -c "import fastapi_users; import fastapi_users_db_sqlalchemy; print('fastapi-users imports ok')" 2>&1             | tee security-readiness/evidence-artifacts/tier4-ci-collection/dependency-import-check.log

      - name: Collect Tier 4 backend runtime tests only
        run: |
          set -o pipefail
          uv run --python 3.11 python -m dotenv -f .vscode/.env run -- pytest --collect-only             backend/tests/integration/tests/chat/test_retrieval_authorization_runtime.py             backend/tests/integration/tests/chat/test_citation_leakage_runtime.py             backend/tests/integration/tests/chat/test_prompt_injection_boundary_runtime.py 2>&1             | tee security-readiness/evidence-artifacts/tier4-ci-collection/pytest-collect.log

      - name: Record collection posture metadata
        if: always()
        run: |
          {
            echo "tier4_status=${TIER4_STATUS}"
            echo "launch_posture=${LAUNCH_POSTURE}"
            echo "note=Collection-only workflow. Runtime PASS/GO is intentionally not asserted."
          } > security-readiness/evidence-artifacts/tier4-ci-collection/collection-status.txt

      - name: Upload Tier 4 collection artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tier4-runtime-collection
          path: |
            security-readiness/evidence-artifacts/tier4-ci-collection/dependency-install.log
            security-readiness/evidence-artifacts/tier4-ci-collection/dependency-import-check.log
            security-readiness/evidence-artifacts/tier4-ci-collection/pytest-collect.log
            security-readiness/evidence-artifacts/tier4-ci-collection/runtime-test.log
            security-readiness/evidence-artifacts/tier4-ci-collection/collection-status.txt
          if-no-files-found: warn
